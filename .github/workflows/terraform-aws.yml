name: Terraform AWS Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev, staging, prod)'
        required: true
        default: 'dev'

jobs:
  terraform:
    name: "Terraform Apply AWS"
    runs-on: ubuntu-latest
    permissions:
      id-token: write # For OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Recommended way to authenticate AWS: OIDC Provider. 
      # Alternatively, use AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} # e.g. arn:aws:iam::1234567890:role/github-actions
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform/aws
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.AWS_S3_TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.AWS_DYNAMODB_LOCK_TABLE }}" \
            -backend-config="key=${{ github.event.inputs.environment }}/terraform.tfstate"

      - name: Terraform Plan
        working-directory: ./terraform/aws
        run: terraform plan -var-file="environments/${{ github.event.inputs.environment }}.tfvars"

      - name: Terraform Apply
        working-directory: ./terraform/aws
        run: terraform apply -auto-approve -var-file="environments/${{ github.event.inputs.environment }}.tfvars"
